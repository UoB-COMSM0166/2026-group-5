<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Config Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
        .test-section { margin: 20px 0; padding: 15px; background: #2a2a3e; border-radius: 8px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        pre { background: #1f1f2e; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Game Config System Test</h1>
    
    <div class="test-section">
        <h2>1. Basic Dependency Test</h2>
        <div id="dependency-test"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Config File Load Test</h2>
        <div id="config-test"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Config Transform Test</h2>
        <div id="transform-test"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Integrity Check</h2>
        <div id="integrity-test"></div>
    </div>

    <!-- Load required scripts. -->
    <script src="map1.js"></script>
    
    <script>
        // Test result containers.
        const depTest = document.getElementById('dependency-test');
        const configTest = document.getElementById('config-test');
        const transformTest = document.getElementById('transform-test');
        const integrityTest = document.getElementById('integrity-test');
        
        // 1. Basic dependency test.
        function testDependencies() {
            let html = '';
            
            // Check Map1Config.
            if (typeof Map1Config !== 'undefined') {
                html += '<p class="success">✓ Map1Config loaded</p>';
            } else {
                html += '<p class="error">✗ Map1Config not found</p>';
                return html;
            }
            
            // Check the config structure.
            if (Map1Config.player) {
                html += '<p class="success">✓ Player config exists</p>';
            } else {
                html += '<p class="error">✗ Player config missing</p>';
            }
            
            if (Map1Config.npcs && Array.isArray(Map1Config.npcs)) {
                html += '<p class="success">✓ NPC config exists (' + Map1Config.npcs.length + ' NPCs)</p>';
            } else {
                html += '<p class="error">✗ NPC config missing or invalid</p>';
            }
            
            if (Map1Config.settings) {
                html += '<p class="success">✓ Map settings exist</p>';
            } else {
                html += '<p class="error">✗ Map settings missing</p>';
            }
            
            depTest.innerHTML = html;
        }
        
        // 2. Config file load test.
        function testConfigLoading() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined') {
                html += '<p class="info">Detailed config contents:</p>';
                html += '<pre>' + JSON.stringify(Map1Config, null, 2) + '</pre>';
            } else {
                html += '<p class="error">Unable to display config contents</p>';
            }
            
            configTest.innerHTML = html;
        }
        
        // 3. Config transform test.
        function testConfigTransform() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined') {
                const baseTile = 16;
                
                function waypoint(tx, ty) {
                    return { x: tx * baseTile + baseTile / 2, y: ty * baseTile + baseTile / 2 };
                }
                
                try {
                    // Simulate the loadMapConfig transform flow.
                    const player = { ...Map1Config.player };
                    const mapSettings = { ...Map1Config.settings };
                    const npcs = Map1Config.npcs.map(npcConfig => ({
                        ...npcConfig,
                        x: npcConfig.x * baseTile,
                        y: npcConfig.y * baseTile,
                        waypoints: npcConfig.waypoints.map(wp => {
                            return waypoint(wp.x, wp.y);
                        })
                    }));
                    
                    html += '<p class="success">✓ Config transform succeeded</p>';
                    html += '<p class="info">Player position: (' + player.x + ', ' + player.y + ')</p>';
                    html += '<p class="info">NPC count after transform: ' + npcs.length + '</p>';
                    
                    if (npcs.length > 0) {
                        html += '<p class="info">First NPC:</p>';
                        html += '<pre>' + JSON.stringify({
                            id: npcs[0].id,
                            x: npcs[0].x,
                            y: npcs[0].y,
                            waypointsCount: npcs[0].waypoints.length,
                            firstWaypoint: npcs[0].waypoints[0]
                        }, null, 2) + '</pre>';
                    }
                    
                    html += '<p class="info">Map settings:</p>';
                    html += '<pre>' + JSON.stringify(mapSettings, null, 2) + '</pre>';
                    
                } catch (error) {
                    html += '<p class="error">✗ Config transform failed: ' + error.message + '</p>';
                }
            } else {
                html += '<p class="error">Unable to run the transform test</p>';
            }
            
            transformTest.innerHTML = html;
        }
        
        // 4. Integrity check.
        function testIntegrity() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined') {
                let issues = [];
                
                // Check required fields.
                if (!Map1Config.player.x || !Map1Config.player.y) {
                    issues.push('Player position config is incomplete');
                }
                
                if (!Map1Config.npcs || Map1Config.npcs.length === 0) {
                    issues.push('NPC config is empty');
                } else {
                    Map1Config.npcs.forEach((npc, index) => {
                        if (!npc.id) issues.push('NPC ' + index + ' is missing an ID');
                        if (!npc.waypoints || npc.waypoints.length === 0) {
                            issues.push('NPC ' + index + ' is missing waypoints');
                        }
                    });
                }
                
                if (!Map1Config.settings) {
                    issues.push('Map settings are missing');
                }
                
                if (issues.length === 0) {
                    html += '<p class="success">✓ All integrity checks passed</p>';
                } else {
                    html += '<p class="error">Issues found:</p>';
                    html += '<ul>';
                    issues.forEach(issue => {
                        html += '<li class="error">' + issue + '</li>';
                    });
                    html += '</ul>';
                }
            } else {
                html += '<p class="error">Unable to run the integrity check</p>';
            }
            
            integrityTest.innerHTML = html;
        }
        
        // Run all tests.
        function runAllTests() {
            testDependencies();
            testConfigLoading();
            testConfigTransform();
            testIntegrity();
        }
        
        // Run the tests after the page loads.
        window.addEventListener('load', runAllTests);
    </script>
</body>
</html>
