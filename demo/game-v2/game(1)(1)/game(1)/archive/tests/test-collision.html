<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Collision Matrix Load Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
        .test-section { margin: 20px 0; padding: 15px; background: #2a2a3e; border-radius: 8px; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .info { color: #60a5fa; }
        pre { background: #1f1f2e; padding: 10px; border-radius: 4px; overflow-x: auto; max-height: 300px; }
        .matrix-preview { font-family: monospace; font-size: 12px; line-height: 1.2; }
    </style>
</head>
<body>
    <h1>Collision Matrix Load Test</h1>
    
    <div class="test-section">
        <h2>1. Basic Config Check</h2>
        <div id="basic-test"></div>
    </div>
    
    <div class="test-section">
        <h2>2. Collision Matrix Validation</h2>
        <div id="collision-test"></div>
    </div>
    
    <div class="test-section">
        <h2>3. Default Spawn Validation</h2>
        <div id="spawn-test"></div>
    </div>
    
    <div class="test-section">
        <h2>4. Matrix Size Analysis</h2>
        <div id="size-test"></div>
    </div>

    <!-- Load config files. -->
    <script src="map1.js"></script>
    
    <script>
        // Test result containers.
        const basicTest = document.getElementById('basic-test');
        const collisionTest = document.getElementById('collision-test');
        const spawnTest = document.getElementById('spawn-test');
        const sizeTest = document.getElementById('size-test');
        
        // 1. Basic config check.
        function testBasicConfig() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined') {
                html += '<p class="success">✓ Map1Config loaded</p>';
                
                if (Map1Config.collisionMatrix) {
                    html += '<p class="success">✓ Collision matrix exists</p>';
                } else {
                    html += '<p class="error">✗ Collision matrix missing</p>';
                }
                
                if (Map1Config.defaultSpawn) {
                    html += '<p class="success">✓ Default spawn exists</p>';
                } else {
                    html += '<p class="error">✗ Default spawn missing</p>';
                }
                
                if (Map1Config.settings) {
                    html += '<p class="success">✓ Map settings exist</p>';
                } else {
                    html += '<p class="error">✗ Map settings missing</p>';
                }
            } else {
                html += '<p class="error">✗ Map1Config not found</p>';
            }
            
            basicTest.innerHTML = html;
        }
        
        // 2. Collision matrix validation.
        function testCollisionMatrix() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined' && Map1Config.collisionMatrix) {
                const matrix = Map1Config.collisionMatrix;
                
                html += '<p class="info">Collision matrix preview (first 5 rows):</p>';
                html += '<pre class="matrix-preview">';
                
                for (let i = 0; i < Math.min(5, matrix.length); i++) {
                    let row = matrix[i].slice(0, 20).join(' ');
                    if (matrix[i].length > 20) row += '...';
                    html += row + '\n';
                }
                
                if (matrix.length > 5) {
                    html += '...\n';
                    html += `${matrix.length} rows total`;
                }
                
                html += '</pre>';
                
                // Validate the matrix data type.
                if (Array.isArray(matrix) && matrix.length > 0) {
                    html += '<p class="success">✓ Collision matrix is a valid 2D array</p>';
                    
                    // Check whether each row is an array.
                    let allRowsValid = true;
                    for (let i = 0; i < Math.min(matrix.length, 10); i++) {
                        if (!Array.isArray(matrix[i])) {
                            allRowsValid = false;
                            break;
                        }
                    }
                    
                    if (allRowsValid) {
                        html += '<p class="success">✓ All rows are valid arrays</p>';
                    } else {
                        html += '<p class="error">✗ Some rows are not arrays</p>';
                    }
                } else {
                    html += '<p class="error">✗ Collision matrix format is invalid</p>';
                }
                
            } else {
                html += '<p class="error">Unable to validate the collision matrix</p>';
            }
            
            collisionTest.innerHTML = html;
        }
        
        // 3. Default spawn validation.
        function testDefaultSpawn() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined' && Map1Config.defaultSpawn) {
                const spawn = Map1Config.defaultSpawn;
                
                html += '<p class="info">Default spawn details:</p>';
                html += '<pre>' + JSON.stringify(spawn, null, 2) + '</pre>';
                
                if (typeof spawn.x === 'number' && typeof spawn.y === 'number') {
                    html += '<p class="success">✓ Spawn coordinates are valid (' + spawn.x + ', ' + spawn.y + ')</p>';
                    
                    // Check whether the coordinates are in a reasonable range.
                    if (spawn.x >= 0 && spawn.y >= 0) {
                        html += '<p class="success">✓ Coordinates are non-negative</p>';
                    } else {
                        html += '<p class="error">✗ Coordinates are negative</p>';
                    }
                } else {
                    html += '<p class="error">✗ Spawn coordinate format is invalid</p>';
                }
                
            } else {
                html += '<p class="error">Unable to validate the default spawn</p>';
            }
            
            spawnTest.innerHTML = html;
        }
        
        // 4. Matrix size analysis.
        function testMatrixSize() {
            let html = '';
            
            if (typeof Map1Config !== 'undefined' && Map1Config.collisionMatrix) {
                const matrix = Map1Config.collisionMatrix;
                const rows = matrix.length;
                const cols = rows > 0 ? matrix[0].length : 0;
                
                html += '<p class="info">Matrix size analysis:</p>';
                html += '<ul>';
                html += '<li class="info">Rows: ' + rows + '</li>';
                html += '<li class="info">Columns: ' + cols + '</li>';
                html += '<li class="info">Total tiles: ' + (rows * cols) + '</li>';
                html += '</ul>';
                
                // Check whether all rows have the same length.
                let consistent = true;
                for (let i = 0; i < rows; i++) {
                    if (matrix[i].length !== cols) {
                        consistent = false;
                        break;
                    }
                }
                
                if (consistent) {
                    html += '<p class="success">✓ All rows have consistent lengths</p>';
                } else {
                    html += '<p class="error">✗ Row lengths are inconsistent</p>';
                }
                
                // Count walls and empty cells.
                let walls = 0;
                let empty = 0;
                
                for (let i = 0; i < rows; i++) {
                    for (let j = 0; j < cols; j++) {
                        if (matrix[i][j] === 1) {
                            walls++;
                        } else if (matrix[i][j] === 0) {
                            empty++;
                        }
                    }
                }
                
                html += '<p class="info">Tile counts:</p>';
                html += '<ul>';
                html += '<li class="info">Walls (1): ' + walls + '</li>';
                html += '<li class="info">Empty cells (0): ' + empty + '</li>';
                html += '<li class="info">Other values: ' + (rows * cols - walls - empty) + '</li>';
                html += '</ul>';
                
            } else {
                html += '<p class="error">Unable to analyze matrix size</p>';
            }
            
            sizeTest.innerHTML = html;
        }
        
        // Run all tests.
        function runAllTests() {
            testBasicConfig();
            testCollisionMatrix();
            testDefaultSpawn();
            testMatrixSize();
        }
        
        // Run the tests after the page loads.
        window.addEventListener('load', runAllTests);
    </script>
</body>
</html>
