<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>map2bomp_merged_colormap Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #111827;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .page {
      width: min(1400px, 100%);
      display: grid;
      grid-template-columns: minmax(320px, 1fr) 320px;
      gap: 20px;
      align-items: start;
    }
    .panel {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }
    .viewer {
      padding: 18px;
    }
    .sidebar {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 16px;
    }
    #game-container {
      position: relative;
      overflow: auto;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 12px;
      min-height: 320px;
      padding: 12px;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      margin: 0 auto;
    }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.72);
      color: #ffffff;
      font-size: 18px;
      backdrop-filter: blur(2px);
    }
    .controls {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    button,
    input[type="range"] {
      appearance: none;
      border: none;
      border-radius: 10px;
    }
    button {
      background: #2563eb;
      color: #eff6ff;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover {
      background: #3b82f6;
    }
    .scale-box {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 12px;
      color: #cbd5e1;
    }
    #scaleSlider {
      width: 140px;
      accent-color: #38bdf8;
    }
    .info-block {
      background: #111827;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
    }
    .info-block h2 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #f8fafc;
    }
    .info-line {
      font-size: 14px;
      color: #cbd5e1;
      line-height: 1.7;
    }
    #map-error {
      color: #fca5a5;
      font-size: 14px;
      word-break: break-word;
    }
    #legend {
      display: grid;
      gap: 8px;
    }
    .legend-item {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #111827;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .legend-number {
      min-width: 34px;
      height: 34px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1d4ed8;
      color: #eff6ff;
      font-weight: 700;
    }
    .legend-text {
      font-size: 13px;
      color: #cbd5e1;
    }
    @media (max-width: 1080px) {
      .page {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel viewer">
      <h1>Map Preview</h1>
      <div class="subtitle">Current map: <span id="map-title">map2bomp_merged_colormap</span></div>
      <div id="game-container">
        <canvas id="mapCanvas"></canvas>
        <div id="loading">loading preview…</div>
      </div>
      <div class="controls">
        <button id="zoomInBtn">Zoom In</button>
        <button id="zoomOutBtn">Zoom Out</button>
        <button id="resetBtn">Reset Zoom</button>
        <button id="gridBtn">Toggle Grid</button>
        <div class="scale-box">
          <span>Zoom</span>
          <input id="scaleSlider" type="range" min="0.5" max="4" step="0.1" value="2" />
          <span id="scale-value">2.00x</span>
        </div>
      </div>
    </section>

    <aside class="panel sidebar">
      <div class="info-block">
        <h2>Map Info</h2>
        <div class="info-line">Map Size: <span id="map-size">-</span></div>
        <div class="info-line">Tile Size: <span id="tile-size">-</span></div>
        <div class="info-line">Layer Count: <span id="layer-count">-</span></div>
      </div>

      <div class="info-block">
        <h2>Value Mapping Legend</h2>
        <div id="legend"></div>
      </div>

      <div class="info-block">
        <h2>Error Info</h2>
        <div id="map-error"></div>
      </div>
    </aside>
  </div>

  <script src="map2bomp_merged_colormap.js"></script>
  <script src="renderer.remap_doors.js"></script>
  <script src="map2bomp_preview_loader.js"></script>
</body>
</html>
