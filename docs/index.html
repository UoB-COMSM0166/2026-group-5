<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape: Oh Dear Dragon!</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Escape: Oh Dear Dragon!</h1>
      <div class="tips-container">
        <span class="tips-label">TIP:</span>
        <span class="tips-text" id="tips-text">Lights off reduces NPC's field of view.</span>
      </div>
      <div class="actions">
      </div>
    </header>

    <main class="game-layout">
      <div id="game-root"></div>
      <div class="stamina-bar-container">
        <div class="stamina-label">STAMINA</div>
        <div class="stamina-bar">
          <div class="stamina-fill" id="stamina-fill"></div>
        </div>
      </div>
      <aside class="hud-panel">
        <div class="collectibles-row">
          <div class="chest-counter">
            <img src="./assets/images/sprites/chest_closed.png" alt="Chest" class="chest-icon">
            <span id="chest-count">0/8</span>
          </div>
          <div class="key-counter">
            <img src="./assets/images/original/interactives/key.png" alt="Key" class="key-icon">
            <span id="key-count">0/10</span>
          </div>
        </div>
        <div class="note-counter">
          <img src="./assets/images/sprites/note.png" alt="Note" class="note-icon">
          <span id="note-count">0/10</span>
        </div>
        <div class="guide-title"><strong>CONTROLS</strong></div>
        <div class="guide-item"><strong>MOVE:</strong>
          <img src="./assets/images/sprites/key_ASDW.png" alt="KeyboardASDW" class="keyboardMove-icon"></div>

        <div class="guide-item"><strong>INTERACT:</strong>
          <img src="./assets/images/sprites/key_E.png" alt="KeyE" class="keyboardPC-icon">
          <br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(All Swich)<br>
        </div>
        <div class="guide-item"><strong>PAUSE:</strong>
          <img src="./assets/images/sprites/key_Esc.png" alt="KeyEsc" class="keyboard2keys-icon"></div>
        <div class="guide-item"><strong>ACCELERATE:</strong>
          <img src="./assets/images/sprites/key_shift.png" alt="Keyshift" class="keyboard2keys-icon"></div>

        <div class="guide-item"><strong>PLACE PORTAL:</strong>
          <img src="./assets/images/sprites/key_space.png" alt="Potal" class="keyboard3keys-icon">
        </div>

        <div class="guide-item"><strong>MAP ZOOM-+:</strong>
          <img src="./assets/images/sprites/mousePC.png" alt="MousePC" class="mousePC-icon">
          <br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(Mouse Wheel)<br>
        </div>

        <img src="./assets/images/ui/hud_bottom.png" alt="HUD Bottom" class="hud-bottom-img">
      </aside>
    </main>
  </div>

  <script src="./p5.js"></script>
  <script src="./src/maps/map1_tiled.js"></script>
  <script src="./src/maps/map2_tiled.js"></script>
  <script src="./src/maps/map3_tiled.js"></script>
  <script src="./src/maps/map1.js"></script>
  <script src="./src/maps/map2.js"></script>
  <script src="./src/maps/map3.js"></script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
