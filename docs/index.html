<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game v8</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Game v8</h1>
      <div class="actions">
        <button data-level="map1">Map 1</button>
        <button data-level="map2">Map 2</button>
        <button data-level="map3">Map 3</button>
      </div>
    </header>
    <main class="game-layout">
      <div id="game-root"></div>
      <aside class="hud-panel">
        <img src="./assets/images/ui/hud_bottom.png" alt="HUD Bottom" class="hud-bottom-img">
        <div class="guide-title">CONTROLS</div>
        <div class="guide-item">
          <strong>MOVE</strong> WASD
        </div>
        <div class="guide-item">
          <strong>SPRINT</strong> Hold Shift
        </div>
        <div class="guide-item">
          <strong>INTERACT</strong>
          <span>E &mdash; Open box<br>Toggle door<br>Toggle light</span>
        </div>
        <div class="guide-item">
          <strong>RESTART</strong> R
        </div>
        <div class="guide-item">
          <strong>MAP ZOOM</strong> Mouse Wheel
        </div>
      </aside>
    </main>
  </div>
  <script src="./p5.js"></script>
  <script src="./maps/map1_tiled.js"></script>
  <script src="./maps/map2_tiled.js"></script>
  <script src="./maps/map3_tiled.js"></script>
  <script src="./maps/map1.js"></script>
  <script src="./maps/map2.js"></script>
  <script src="./maps/map3.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
