<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game v8</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <h1>Game v8</h1>
      <div class="actions">
        <button data-level="map1">Map 1</button>
        <button data-level="map2">Map 2</button>
        <button data-level="map3">Map 3</button>
      </div>
    </header>

    <main class="game-layout">
      <div id="game-root"></div>
      <div class="stamina-bar-container">
        <div class="stamina-label">STAMINA</div>
        <div class="stamina-bar">
          <div class="stamina-fill" id="stamina-fill"></div>
        </div>
      </div>
      <aside class="hud-panel">
        <div class="guide-title"><strong>Controls</strong></div>
        <div class="collectibles-row">
          <div class="chest-counter">
            <img src="./assets/images/sprites/chest_closed.png" alt="Chest" class="chest-icon">
            <span id="chest-count">0/8</span>
          </div>
          <div class="key-counter">
            <img src="./assets/images/original/interactives/key.png" alt="Key" class="key-icon">
            <span id="key-count">0/10</span>
          </div>
        </div>
        <div class="note-counter">
          <img src="./assets/images/sprites/note.png" alt="Note" class="note-icon">
          <span id="note-count">0/10</span>
        </div>
        <div class="guide-item"><strong>Move:</strong> 
          W<span class="arrow">↑</span> 
          S<span class="arrow">↓</span> 
          A<span class="arrow">←</span> 
          D<span class="arrow">→</span></div>
        <div class="guide-item"><strong>Interact:</strong> E 
          (Open box, Open/Close door, Turn on/off light)</div>
        <div class="guide-item"><strong>Restart:</strong> ESC</div>
        <div class="guide-item"><strong>Map Zoom-+:</strong> Mouse Wheel</div>
        <img src="./assets/images/ui/hud_bottom.png" alt="HUD Bottom" class="hud-bottom-img">
      </aside>
    </main>
  </div>

  <script src="./p5.js"></script>
  <script src="./maps/map1_tiled.js"></script>
  <script src="./maps/map2_tiled.js"></script>
  <script src="./maps/map3_tiled.js"></script>
  <script src="./maps/map1.js"></script>
  <script src="./maps/map2.js"></script>
  <script src="./maps/map3.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
